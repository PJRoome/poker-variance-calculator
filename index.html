<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poker Variance Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1400px;
  margin: 20px auto;
  padding: 20px;
  background: #111;
  color: #eee;
}

h1 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  background: #2ecc71;
  color: #111;
  font-weight: bold;
  cursor: pointer;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.checkbox-row input {
  width: auto;
}

.results {
  font-size: 18px;
  line-height: 1.6;
}

.chart-card {
  height: 760px;
}

#chart {
  width: 100% !important;
  height: 700px !important;
}
</style>
</head>

<body>

<h1>Poker Variance Simulator</h1>

<div class="card">

<label>Game preset</label>
<select id="game" onchange="setPreset()">
<option value="90">NLHE Cash</option>
<option value="150" selected>PLO Cash</option>
<option value="180">High Variance PLO</option>
<option value="custom">Custom</option>
</select>

<label>Winrate (bb/100)</label>
<input id="winrate" type="number" value="5" step="0.1">

<label>Std dev (bb/100)</label>
<input id="sd" type="number" value="150" step="1">

<label>Total hands</label>
<input id="hands" type="number" min="1" value="10000" step="100">

<label>Simulation runs (1–20)</label>
<input id="runs" type="number" min="1" max="20" value="10">

<label>Bankroll (bb)</label>
<input id="bankroll" type="number" value="2000" step="100">

<div class="checkbox-row">
<input id="show68" type="checkbox" checked>
<span>Show 68% interval</span>
</div>

<div class="checkbox-row">
<input id="show95" type="checkbox" checked>
<span>Show 95% interval</span>
</div>

<div class="checkbox-row">
<input id="show98" type="checkbox" checked>
<span>Show 98% interval</span>
</div>

<button onclick="calculate()">Run simulation</button>

</div>

<div class="card results" id="results"></div>

<div class="card chart-card">
<canvas id="chart"></canvas>
</div>

<script>

let chart;

const whiteBackgroundPlugin = {
  id: "whiteBackground",
  beforeDraw: (chart) => {
    const ctx = chart.ctx;
    ctx.save();
    ctx.globalCompositeOperation = "destination-over";
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, chart.width, chart.height);
    ctx.restore();
  }
};

function setPreset(){
  const game = document.getElementById("game").value;

  if(game !== "custom"){
    document.getElementById("sd").value = game;
  }
}

function randn(){
  let u = 0;
  let v = 0;

  while(u === 0) u = Math.random();
  while(v === 0) v = Math.random();

  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function normalCDF(x){
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);

  const a1 = 0.254829592;
  const a2 = -0.284496736;
  const a3 = 1.421413741;
  const a4 = -1.453152027;
  const a5 = 1.061405429;
  const p = 0.3275911;

  const t = 1 / (1 + p * x);
  const erf = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);

  return 0.5 * (1 + sign * erf);
}

function getGraphStep(hands){
  const targetPoints = 900;
  const rawStep = hands / targetPoints;

  if(rawStep <= 100){
    return 100;
  }

  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const normalised = rawStep / magnitude;

  let niceStep;

  if(normalised <= 1){
    niceStep = 1;
  } else if(normalised <= 2){
    niceStep = 2;
  } else if(normalised <= 5){
    niceStep = 5;
  } else {
    niceStep = 10;
  }

  return niceStep * magnitude;
}

function makeLabels(hands, step){
  const labels = [];

  for(let h = 0; h < hands; h += step){
    labels.push(Math.round(h));
  }

  if(labels[labels.length - 1] !== hands){
    labels.push(hands);
  }

  return labels;
}

function intervalDataset(label, data, dash){
  return {
    label: label,
    data: data,
    borderWidth: 2,
    pointRadius: 0,
    borderDash: dash,
    tension: 0.1
  };
}

function calculate(){

  const winrate = Number(document.getElementById("winrate").value);
  const sd = Number(document.getElementById("sd").value);
  let hands = Number(document.getElementById("hands").value);
  const bankroll = Number(document.getElementById("bankroll").value);

  hands = Math.max(hands, 1);
  document.getElementById("hands").value = hands;

  let runs = Number(document.getElementById("runs").value);
  runs = Math.min(Math.max(runs, 1), 20);
  document.getElementById("runs").value = runs;

  const show68 = document.getElementById("show68").checked;
  const show95 = document.getElementById("show95").checked;
  const show98 = document.getElementById("show98").checked;

  const step = getGraphStep(hands);
  const labels = makeLabels(hands, step);

  const expectedData = [];
  const bustLine = [];

  const upper68 = [];
  const lower68 = [];
  const upper95 = [];
  const lower95 = [];
  const upper98 = [];
  const lower98 = [];

  for(let i = 0; i < labels.length; i++){

    const h = labels[i];
    const expected = winrate * h / 100;
    const sampleSD = sd * Math.sqrt(h / 100);

    expectedData.push(expected);
    bustLine.push(-bankroll);

    upper68.push(expected + sampleSD);
    lower68.push(expected - sampleSD);

    upper95.push(expected + 1.96 * sampleSD);
    lower95.push(expected - 1.96 * sampleSD);

    upper98.push(expected + 2.326 * sampleSD);
    lower98.push(expected - 2.326 * sampleSD);
  }

  const finalMean = winrate * hands / 100;
  const finalSD = sd * Math.sqrt(hands / 100);

  const low68 = finalMean - finalSD;
  const high68 = finalMean + finalSD;

  const low95 = finalMean - 1.96 * finalSD;
  const high95 = finalMean + 1.96 * finalSD;

  const low98 = finalMean - 2.326 * finalSD;
  const high98 = finalMean + 2.326 * finalSD;

  let ruinProb = 0;

  if(finalSD > 0){
    const zScore = (-bankroll - finalMean) / finalSD;
    ruinProb = normalCDF(zScore);
  }

  document.getElementById("results").innerHTML = `
    <strong>Expected result:</strong> ${finalMean.toFixed(1)} bb<br>
    <strong>Std deviation over sample:</strong> ${finalSD.toFixed(1)} bb<br>
    <strong>Graph spacing:</strong> every ${Math.round(step).toLocaleString()} hands<br><br>

    <strong>68% confidence interval:</strong>
    ${low68.toFixed(1)} bb → ${high68.toFixed(1)} bb<br>

    <strong>95% confidence interval:</strong>
    ${low95.toFixed(1)} bb → ${high95.toFixed(1)} bb<br>

    <strong>98% confidence interval:</strong>
    ${low98.toFixed(1)} bb → ${high98.toFixed(1)} bb<br><br>

    <strong>Chance of finishing down ≥ bankroll:</strong>
    <span style="color:${ruinProb > 0.25 ? '#ff6b6b' : '#2ecc71'}">
    ${(ruinProb * 100).toFixed(2)}%
    </span>
  `;

  const datasets = [];

  datasets.push({
    label: "Expected result",
    data: expectedData,
    borderWidth: 4,
    pointRadius: 0
  });

  datasets.push({
    label: "Bankroll line",
    data: bustLine,
    borderWidth: 2,
    borderDash: [6, 6],
    pointRadius: 0
  });

  if(show68){
    datasets.push(intervalDataset("68% upper", upper68, [4, 4]));
    datasets.push(intervalDataset("68% lower", lower68, [4, 4]));
  }

  if(show95){
    datasets.push(intervalDataset("95% upper", upper95, [8, 4]));
    datasets.push(intervalDataset("95% lower", lower95, [8, 4]));
  }

  if(show98){
    datasets.push(intervalDataset("98% upper", upper98, [2, 4]));
    datasets.push(intervalDataset("98% lower", lower98, [2, 4]));
  }

  for(let r = 0; r < runs; r++){

    let result = 0;
    let previousHands = 0;
    const line = [];

    for(let i = 0; i < labels.length; i++){

      const currentHands = labels[i];
      const handDifference = currentHands - previousHands;

      if(currentHands === 0){
        result = 0;
        line.push(0);
      } else {
        const meanForStep = winrate * handDifference / 100;
        const sdForStep = sd * Math.sqrt(handDifference / 100);

        result += meanForStep + sdForStep * randn();
        line.push(result);
      }

      previousHands = currentHands;
    }

    datasets.push({
      label: "Run " + (r + 1),
      data: line,
      borderWidth: 1.2,
      pointRadius: 0,
      tension: 0.1
    });
  }

  drawChart(labels, datasets);
}

function drawChart(labels, datasets){

  const ctx = document.getElementById("chart").getContext("2d");

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx, {

    type: "line",
    plugins: [whiteBackgroundPlugin],

    data: {
      labels: labels,
      datasets: datasets
    },

    options: {

      responsive: true,
      maintainAspectRatio: false,
      animation: false,

      plugins: {

        title: {
          display: true,
          text: "Poker Variance Simulation",
          color: "#000"
        },

        legend: {
          labels: {
            color: "#000",
            filter: function(item){
              return !item.text.startsWith("Run");
            }
          }
        }
      },

      scales: {

        x: {
          ticks: {
            color: "#000",
            callback: function(value){
              return Number(this.getLabelForValue(value)).toLocaleString();
            }
          },
          grid: { color: "#ddd" },
          title: {
            display: true,
            text: "Hands",
            color: "#000"
          }
        },

        y: {
          ticks: { color: "#000" },
          grid: { color: "#ddd" },
          title: {
            display: true,
            text: "Profit (bb)",
            color: "#000"
          }
        }
      }
    }
  });
}

calculate();

</script>

</body>
</html>
