<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poker Variance Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1400px;
  margin: 20px auto;
  padding: 20px;
  background: #111;
  color: #eee;
}

h1 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  background: #2ecc71;
  color: #111;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: wait;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.checkbox-row input {
  width: auto;
}

.results {
  font-size: 18px;
  line-height: 1.6;
}

.chart-card {
  height: 760px;
}

#chart {
  width: 100% !important;
  height: 700px !important;
}
</style>
</head>

<body>

<h1>Poker Variance Simulator</h1>

<div class="card">

<label>Game preset</label>
<select id="game" onchange="setPreset()">
<option value="90">NLHE Cash</option>
<option value="150" selected>PLO Cash</option>
<option value="180">High Variance PLO</option>
<option value="custom">Custom</option>
</select>

<label>Winrate (bb/100)</label>
<input id="winrate" type="number" value="5" step="0.1">

<label>Std dev (bb/100)</label>
<input id="sd" type="number" value="150" step="1">

<label>Total hands</label>
<input id="hands" type="number" min="1" value="10000" step="100">

<label>Simulation runs (1–20)</label>
<input id="runs" type="number" min="1" max="20" value="10">

<label>Bankroll (bb)</label>
<input id="bankroll" type="number" value="2000" step="100">

<div class="checkbox-row">
<input id="show68" type="checkbox" checked>
<span>Show 68% interval</span>
</div>

<div class="checkbox-row">
<input id="show95" type="checkbox" checked>
<span>Show 95% interval</span>
</div>

<div class="checkbox-row">
<input id="show98" type="checkbox" checked>
<span>Show 98% interval</span>
</div>

<button id="runButton" onclick="calculate()">Run simulation</button>

</div>

<div class="card results" id="results"></div>

<div class="card chart-card">
<canvas id="chart"></canvas>
</div>

<script>

let chart;
let worker;

const whiteBackgroundPlugin = {
  id: "whiteBackground",
  beforeDraw: (chart) => {
    const ctx = chart.ctx;
    ctx.save();
    ctx.globalCompositeOperation = "destination-over";
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, chart.width, chart.height);
    ctx.restore();
  }
};

function setPreset(){
  const game = document.getElementById("game").value;
  if(game !== "custom"){
    document.getElementById("sd").value = game;
  }
}

/* adaptive spacing logic */

function getGraphStep(hands){

  const targetPoints = 900;

  const rawStep = hands / targetPoints;

  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));

  const normalised = rawStep / magnitude;

  let nice;

  if(normalised <= 1) nice = 1;
  else if(normalised <= 2) nice = 2;
  else if(normalised <= 5) nice = 5;
  else nice = 10;

  return Math.max(100, nice * magnitude);
}

function makeLabels(hands, step){

  const labels = [];

  for(let h = 0; h < hands; h += step){
    labels.push(h);
  }

  if(labels[labels.length - 1] !== hands){
    labels.push(hands);
  }

  return labels;
}

/* normal distribution */

function normalCDF(x){

  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);

  const a1 = 0.254829592;
  const a2 = -0.284496736;
  const a3 = 1.421413741;
  const a4 = -1.453152027;
  const a5 = 1.061405429;
  const p = 0.3275911;

  const t = 1 / (1 + p * x);

  const erf = 1 - (((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x));

  return 0.5 * (1 + sign * erf);
}

function intervalDataset(label,data,dash){

  return {
    label: label,
    data: data,
    borderWidth: 2,
    pointRadius: 0,
    borderDash: dash,
    tension: 0.1
  };

}

function calculate(){

  const button = document.getElementById("runButton");

  button.disabled = true;
  button.textContent = "Simulating...";

  const winrate = Number(winrateInput.value);
  const sd = Number(sdInput.value);
  const hands = Number(handsInput.value);
  const bankroll = Number(bankrollInput.value);

  let runs = Number(runsInput.value);
  runs = Math.min(Math.max(runs,1),20);

  const step = getGraphStep(hands);

  const labels = makeLabels(hands,step);

  const expectedData = [];
  const bustLine = [];

  const upper68=[];
  const lower68=[];
  const upper95=[];
  const lower95=[];
  const upper98=[];
  const lower98=[];

  labels.forEach(h=>{

    const mean = winrate*h/100;

    const sdSample = sd*Math.sqrt(h/100);

    expectedData.push(mean);

    bustLine.push(-bankroll);

    upper68.push(mean+sdSample);
    lower68.push(mean-sdSample);

    upper95.push(mean+1.96*sdSample);
    lower95.push(mean-1.96*sdSample);

    upper98.push(mean+2.326*sdSample);
    lower98.push(mean-2.326*sdSample);

  });

  const finalMean = winrate*hands/100;

  const finalSD = sd*Math.sqrt(hands/100);

  const ruinProb = normalCDF((-bankroll-finalMean)/finalSD);

  results.innerHTML = `

Expected result: ${finalMean.toFixed(1)} bb<br>
Std deviation: ${finalSD.toFixed(1)} bb<br>
Graph spacing: every ${step.toLocaleString()} hands<br><br>

68% interval: ${(finalMean-finalSD).toFixed(1)} → ${(finalMean+finalSD).toFixed(1)} bb<br>
95% interval: ${(finalMean-1.96*finalSD).toFixed(1)} → ${(finalMean+1.96*finalSD).toFixed(1)} bb<br>
98% interval: ${(finalMean-2.326*finalSD).toFixed(1)} → ${(finalMean+2.326*finalSD).toFixed(1)} bb<br><br>

Chance of losing bankroll: ${(ruinProb*100).toFixed(2)}%

`;

  if(worker) worker.terminate();

  worker = new Worker("worker.js");

  worker.onmessage = e=>{

    const datasets=[];

    datasets.push({
      label:"Expected result",
      data:expectedData,
      borderWidth:4,
      pointRadius:0
    });

    datasets.push({
      label:"Bankroll line",
      data:bustLine,
      borderWidth:2,
      borderDash:[6,6],
      pointRadius:0
    });

    if(show68.checked){

      datasets.push(intervalDataset("68% upper",upper68,[4,4]));
      datasets.push(intervalDataset("68% lower",lower68,[4,4]));

    }

    if(show95.checked){

      datasets.push(intervalDataset("95% upper",upper95,[8,4]));
      datasets.push(intervalDataset("95% lower",lower95,[8,4]));

    }

    if(show98.checked){

      datasets.push(intervalDataset("98% upper",upper98,[2,4]));
      datasets.push(intervalDataset("98% lower",lower98,[2,4]));

    }

    e.data.runLines.forEach((line,i)=>{

      datasets.push({
        label:"Run "+(i+1),
        data:line,
        borderWidth:1.2,
        pointRadius:0,
        tension:0.1
      });

    });

    drawChart(labels,datasets);

    button.disabled=false;

    button.textContent="Run simulation";

  };

  worker.postMessage({winrate,sd,labels,runs});

}

function drawChart(labels,datasets){

  const ctx=chartCanvas.getContext("2d");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{

    type:"line",

    plugins:[whiteBackgroundPlugin],

    data:{labels,datasets},

    options:{

      responsive:true,
      maintainAspectRatio:false,
      animation:false,

      plugins:{
        legend:{
          labels:{
            color:"#000",
            filter:item=>!item.text.startsWith("Run")
          }
        }
      },

      scales:{
        x:{
          ticks:{
            color:"#000",
            callback:v=>Number(labels[v]).toLocaleString()
          },
          grid:{color:"#ddd"}
        },
        y:{
          ticks:{color:"#000"},
          grid:{color:"#ddd"}
        }
      }

    }

  });

}

calculate();

</script>

</body>
</html>
